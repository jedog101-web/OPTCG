name: OP Spoiler Bot

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore seen cards
        run: |
          if [ -f seen_cards.json ]; then
            echo "seen_cards.json found"
          else
            echo "[]" > seen_cards.json
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        run: python onepiece_spoiler_bot.py

      - name: Commit seen cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_cards.json
          git diff --staged --quiet || git commit -m "Update seen_cards.json"
          git push
